<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1040"/>
      <stop offset="100%" style="stop-color:#0d0d2b"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="30%" style="stop-color:#3b82f6"/>
      <stop offset="60%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="50%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="outerGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="12" y="12" width="176" height="176" rx="36" ry="36" fill="url(#bgGrad)" stroke="url(#borderGrad)" stroke-width="4" filter="url(#outerGlow)"/>
  
  <!-- Purple glow at bottom -->
  <ellipse cx="100" cy="170" rx="60" ry="20" fill="#7c3aed" opacity="0.15"/>
  
  <!-- House icon group -->
  <g filter="url(#glow)" transform="translate(100,105)" fill="none" stroke="url(#iconGrad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Roof -->
    <path d="M-45,0 L0,-40 L45,0"/>
    <!-- House body -->
    <path d="M-35,0 L-35,35 L35,35 L35,0"/>
    <!-- Door -->
    <path d="M-10,35 L-10,15 L10,15 L10,35"/>
    <!-- Wifi signals -->
    <path d="M-12,-8 A17,17 0 0,1 12,-8" fill="none" stroke-width="4"/>
    <path d="M-20,-15 A28,28 0 0,1 20,-15" fill="none" stroke-width="4"/>
    <!-- Wifi dot -->
    <circle cx="0" cy="0" r="3" fill="url(#iconGrad)" stroke="none"/>
  </g>
</svg>
