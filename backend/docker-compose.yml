services:
  mqtt:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -W 3 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app123
      POSTGRES_DB: smarthome
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d smarthome"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./server
    restart: unless-stopped
    environment:
      PORT: 3000
      DATABASE_URL: postgres://app:app123@db:5432/smarthome
      MQTT_URL: mqtt://mqtt:1883
      JWT_SECRET: "CHANGE_ME_STRONG_SECRET"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      mqtt:
        condition: service_healthy

volumes:
  pgdata:
