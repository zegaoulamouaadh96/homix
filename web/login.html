<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HomiX — تسجيل الدخول للإدارة</title>
  <link rel="stylesheet" href="admin/admin.css">
  <link rel="icon" type="image/svg+xml" href="images/logo.svg">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">Homi<span style="color: var(--neon-blue)">X</span></div>
      <div class="login-subtitle">🔒 لوحة تحكم الإدارة</div>

      <div class="login-error" id="loginError">اسم المستخدم أو كلمة المرور غير صحيحة</div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>اسم المستخدم</label>
          <input type="text" class="form-control" id="username" placeholder="أدخل اسم المستخدم" required autocomplete="username">
        </div>
        <div class="form-group">
          <label>كلمة المرور</label>
          <input type="password" class="form-control" id="password" placeholder="أدخل كلمة المرور" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary" id="loginBtn">
          🔐 تسجيل الدخول
        </button>
      </form>

      <div style="text-align:center; margin-top: 24px;">
        <a href="index.html" style="color: var(--text-gray); font-size: 0.85rem;">← العودة للموقع الرئيسي</a>
      </div>
    </div>
  </div>

  <script>
    async function handleLogin(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('loginError');
      const btn = document.getElementById('loginBtn');

      errorEl.classList.remove('show');
      btn.innerHTML = '⏳ جاري التحقق...';
      btn.disabled = true;

      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (data.success) {
          sessionStorage.setItem('homix_token', data.token);
          sessionStorage.setItem('homix_admin', data.admin);
          window.location.href = 'admin/index.html';
        } else {
          errorEl.textContent = data.message || 'اسم المستخدم أو كلمة المرور غير صحيحة';
          errorEl.classList.add('show');
        }
      } catch (err) {
        errorEl.textContent = 'خطأ في الاتصال بالسيرفر';
        errorEl.classList.add('show');
      }

      btn.innerHTML = '🔐 تسجيل الدخول';
      btn.disabled = false;
    }
  </script>
</body>
</html>
