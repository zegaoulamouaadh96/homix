# Mosquitto MQTT Broker with SSL/TLS Configuration
# For MQTT over SSL (MQTTS) on port 8883

listener 1883
protocol mqtt
allow_anonymous true

# MQTT over SSL (MQTTS)
listener 8883
protocol mqtt
certfile /etc/mosquitto/certs/homix.systems.crt
keyfile /etc/mosquitto/certs/homix.systems.key
cafile /etc/mosquitto/certs/chain.pem
allow_anonymous true

# MQTT over WebSocket Secure (WSS)
listener 9001
protocol websockets
certfile /etc/mosquitto/certs/homix.systems.crt
keyfile /etc/mosquitto/certs/homix.systems.key
cafile /etc/mosquitto/certs/chain.pem
allow_anonymous true

# Persistence
persistence true
persistence_location /mosquitto/data/
persistence_file mosquitto.db

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# Security
max_connections -1
max_queued_messages 1000
