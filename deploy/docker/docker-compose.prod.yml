version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: homix
      POSTGRES_PASSWORD: ${DB_PASSWORD:-homix_secure_password_2024}
      POSTGRES_DB: homix
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - homix-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homix"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MQTT Broker (Mosquitto)
  mqtt:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"   # MQTT TCP
      - "9001:9001"   # MQTT over WebSocket
      - "8883:8883"   # MQTT over SSL (MQTTS)
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
      - /etc/mosquitto/certs:/etc/mosquitto/certs
    networks:
      - homix-network
    depends_on:
      - db

  # Redis (for caching)
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - homix-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ../../backend/server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgres://homix:${DB_PASSWORD:-homix_secure_password_2024}@db:5432/homix
      MQTT_URL: mqtt://mqtt:1883
      MQTT_ENABLE_WS: "true"
      MQTT_ENABLE_TCP: "true"
      MQTT_PORT: 1883
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production_use_strong_secret}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-change_this_in_production_use_strong_admin_secret}
      HOMIX_AI_URL: http://ai:5000
      FACE_REQUIRE_HTTPS: "true"
      FACE_DEVICE_TOKEN: ${FACE_DEVICE_TOKEN:-prod-face-device-token-2024}
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    volumes:
      - backend_data:/app/data
    networks:
      - homix-network
    depends_on:
      db:
        condition: service_healthy
      mqtt:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Face Recognition AI Service
  ai:
    build:
      context: ../../backend/ai
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: 1
    ports:
      - "5000:5000"
    volumes:
      - ai_cache:/opt/homix-cache
    networks:
      - homix-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Nginx Reverse Proxy (for production with SSL)
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/homix.conf:/etc/nginx/conf.d/homix.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /etc/mosquitto/certs:/etc/mosquitto/certs:ro
      - nginx_logs:/var/log/nginx
    networks:
      - homix-network
    depends_on:
      - backend

volumes:
  postgres_data:
  mosquitto_data:
  mosquitto_log:
  redis_data:
  backend_data:
  ai_cache:
  nginx_logs:

networks:
  homix-network:
    driver: bridge
